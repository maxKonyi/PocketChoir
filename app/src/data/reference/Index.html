    window.addEventListener("resize", updateSvgSize);

    document.getElementById("chordSvg").addEventListener("click", onCreateGridClick);

    // ===== CHOIR MODE UI + STATE =====
    // Global state variables for Choir Mode functionality
    let choirModeEnabled = false;           // Whether Choir Mode is active
    let clickTrackEnabled = false;          // Whether click/metronome is on
    let isRecording = false;                // Whether we are currently recording
    let recordingVoiceIndex = null;         // Which voice (0-3) is being recorded
    let playSynthEnabled = true;            // Whether to play synth during playback
    let playVocalsEnabled = true;           // Whether to play recorded vocals during playback

    // Storage for recorded audio (one blob URL per voice part)
    // Index 0 = Soprano, 1 = Alto, 2 = Tenor, 3 = Bass
    const voiceRecordings = [null, null, null, null];

    // Storage for pitch trace data per voice
    // Each element is an array of {tSec, midi, confidence} objects
    const pitchTraceData = [[], [], [], []];

    // Tone.js Players for vocal playback (one per voice)
    const vocalPlayers = [null, null, null, null];

    // Reference to the vocal gain nodes for mixing
    const vocalGains = [];
    const vocalPanners = []; // To store panners for vocal tracks

    // ===== CLICK + COUNT-IN =====
    // Click track synth - uses a short percussive sound
    let clickSynth = null;        // Will be initialized on first use
    let clickLoop = null;         // Tone.Loop for the click track
    let countInScheduleId = null; // ID for scheduled count-in events

    /**
     * Initialize the click synth if not already created.
     * Uses a MembraneSynth for a drum-like click sound.
     */
    function initClickSynth() {
      if (clickSynth) return; // Already initialized
      // Create a simple membrane synth for the click sound
      clickSynth = new Tone.MembraneSynth({
        pitchDecay: 0.008,      // Very short pitch decay for a sharp click
        octaves: 2,             // Pitch sweep range
        oscillator: { type: "sine" },
        envelope: {
          attack: 0.001,        // Instant attack
          decay: 0.1,           // Short decay
          sustain: 0,           // No sustain
          release: 0.05         // Quick release
        },
        volume: -10             // Moderate volume
      }).toDestination();
    }

    /**
     * Start the click track loop.
     * Plays a click on every beat, with a stronger accent on beat 1.
     */
    function startClickTrack() {
      if (!clickTrackEnabled) return;
      initClickSynth();
      
      // Stop any existing click loop
      stopClickTrack();
      
      // Create a new loop that triggers on every quarter note
      let beatCounter = 0;
      clickLoop = new Tone.Loop((time) => {
        // Accent on beat 1 (higher pitch), lighter on other beats
        const isDownbeat = beatCounter % 4 === 0;
        const pitch = isDownbeat ? "C4" : "C5";
        const velocity = isDownbeat ? 0.8 : 0.5;
        clickSynth.triggerAttackRelease(pitch, "32n", time, velocity);
        beatCounter++;
      }, "4n");
      
      clickLoop.start(0);
    }

    /**
     * Stop the click track loop.
     */
    function stopClickTrack() {
      if (clickLoop) {
        clickLoop.stop();
        clickLoop.dispose();
        clickLoop = null;
      }
    }

    /**
     * Perform a 1-bar count-in before recording starts.
     * Shows visual beat numbers and plays click sounds.
     * @param {Function} onComplete - Callback when count-in finishes
     */
    function doCountIn(onComplete) {
      initClickSynth();
      
      const countInDisplay = document.getElementById("countInDisplay");
      countInDisplay.style.display = "block";
      
      // Get the duration of one beat in seconds
      const beatDuration = 60 / Tone.Transport.bpm.value;
      
      // Schedule 4 beats of count-in
      let beatNumber = 1;
      
      // Immediately show and play beat 1
      countInDisplay.textContent = beatNumber.toString();
      const isDownbeat = true;
      clickSynth.triggerAttackRelease(isDownbeat ? "C4" : "C5", "32n", Tone.now(), isDownbeat ? 0.8 : 0.5);
      
      // Schedule beats 2, 3, 4
      for (let i = 1; i < 4; i++) {
        const beat = i + 1;
        setTimeout(() => {
          countInDisplay.textContent = beat.toString();
          const accent = beat === 1;
          clickSynth.triggerAttackRelease(accent ? "C4" : "C5", "32n", Tone.now(), accent ? 0.8 : 0.5);
        }, beatDuration * 1000 * i);
      }
      
      // After 4 beats, hide the display and call the callback
      setTimeout(() => {
        countInDisplay.style.display = "none";
        if (onComplete) onComplete();
      }, beatDuration * 1000 * 4);
    }

    // ===== MIC SETUP + ANALYSIS =====
    // Variables for microphone and audio analysis
    let micStream = null;           // MediaStream from getUserMedia
    let micSourceNode = null;       // MediaStreamAudioSourceNode
    let analyserNode = null;        // AnalyserNode for pitch detection
    let monoMixer = null;           // GainNode for summing stereo to mono
    let monoDest = null;            // MediaStreamAudioDestinationNode for mono recording
    let audioContext = null;        // AudioContext for Web Audio API
    let mediaRecorder = null;       // MediaRecorder for capturing audio
    let recordedChunks = [];        // Array to store recorded audio chunks

    /**
     * Request microphone permissions and set up the audio analysis chain.
     * This should be called once when Choir Mode is first enabled.
     * @returns {Promise<boolean>} True if mic setup succeeded
     */
    async function setupMicrophone() {
      // If already set up, return true
      if (micStream && analyserNode) return true;
      
      try {
        // Request microphone access
        // We request raw audio without processing
        micStream = await navigator.mediaDevices.getUserMedia({ 
          audio: {
            echoCancellation: false,
            noiseSuppression: false,
            autoGainControl: false,
            channelCount: 2, // Request stereo if available so we can sum it ourselves
            sampleRate: 44100
          } 
        });
        
        // Create or reuse AudioContext
        audioContext = audioContext || new (window.AudioContext || window.webkitAudioContext)();
        
        // Create source node from the mic stream
        micSourceNode = audioContext.createMediaStreamSource(micStream);

        // FORCED MONO SUMMING:
        // Create a gain node that forces a downmix to mono for both analysis and recording
        monoMixer = audioContext.createGain();
        
        // Initialize gain from slider (with +20dB baseline offset)
        const inputSlider = document.getElementById("inputGainSlider");
        const sliderValDb = inputSlider ? parseFloat(inputSlider.value) : 0;
        const totalGainDb = sliderValDb + 20; 
        monoMixer.gain.value = Math.pow(10, totalGainDb / 20);

        monoMixer.channelCount = 1;
        monoMixer.channelCountMode = 'explicit';
        monoMixer.channelInterpretation = 'speakers';
        
        // Create a destination node to get a mono stream for MediaRecorder
        monoDest = audioContext.createMediaStreamDestination();
        
        // Create analyser for pitch detection
        analyserNode = audioContext.createAnalyser();
        analyserNode.fftSize = 4096;
        
        // Connect: mic -> monoMixer -> analyser & monoDest
        micSourceNode.connect(monoMixer);
        monoMixer.connect(analyserNode);
        monoMixer.connect(monoDest);

        // Start Input Meter Loop
        updateInputLevelMeter();
        
        console.log("Microphone setup complete (Summed Mono for Analysis & Recording)");
        return true;
      } catch (err) {
        console.error("Microphone access denied or error:", err);
        alert("Microphone access is required for Choir Mode recording. Please allow access and try again.");
        return false;
      }
    }

    // Input Gain Slider Logic
    const inputGainSlider = document.getElementById("inputGainSlider");
    if (inputGainSlider) {
      inputGainSlider.addEventListener("input", (e) => {
        const val = parseFloat(e.target.value);
        document.getElementById("inputGainValue").textContent = val;
        if (monoMixer) {
          // Convert dB to linear (with +20dB baseline offset)
          const totalGainDb = val + 20;
          const linear = Math.pow(10, totalGainDb / 20);
          monoMixer.gain.setTargetAtTime(linear, audioContext.currentTime, 0.1);
        }
      });
    }

    // Input Level Meter Loop
    function updateInputLevelMeter() {
      if (!analyserNode || !audioContext) return;
      
      const bufferLen = analyserNode.fftSize;
      const data = new Float32Array(bufferLen);
      analyserNode.getFloatTimeDomainData(data);
      
      let maxVal = 0;
      for (let i = 0; i < bufferLen; i++) {
        const abs = Math.abs(data[i]);
        if (abs > maxVal) maxVal = abs;
      }
      
      const bar = document.getElementById("inputMeterBar");
      if (bar) {
        // Linear scale 0-1 for clipping visualization
        const pct = Math.min(100, maxVal * 100); 
        bar.style.width = pct + "%";
        
        // Color coding
        if (maxVal >= 0.95) { // Clipping/Peak
          bar.style.backgroundColor = "#ff0000"; 
        } else if (maxVal > 0.7) { // Warning
          bar.style.backgroundColor = "#ffcc00";
        } else { // Good
          bar.style.backgroundColor = "#00ff00";
        }
      }
      
      // Keep running if the audio context is active
      if (audioContext.state === 'running') {
          requestAnimationFrame(updateInputLevelMeter);
      }
    }

    // ===== PITCH DETECTION + TRACE DATA =====
    // Variables for pitch detection loop
    let pitchDetectionRunning = false;  // Whether the pitch detection loop is active
    let pitchDetectionAnimFrame = null; // requestAnimationFrame ID
    let recordingStartTime = 0;         // Transport time when recording started

    /**
     * Autocorrelation-based pitch detection algorithm.
     * Analyzes the audio buffer and returns detected pitch info.
     * @param {AnalyserNode} analyser - The analyser node to read from
     * @returns {{midi: number, confidence: number}} Detected MIDI note and confidence
     */
    function detectPitch(analyser) {
      const bufferLength = analyser.fftSize;
      const buffer = new Float32Array(bufferLength);
      analyser.getFloatTimeDomainData(buffer);
      
      // Calculate RMS (root mean square) to check if there's significant audio
      let rms = 0;
      for (let i = 0; i < bufferLength; i++) {
        rms += buffer[i] * buffer[i];
      }
      rms = Math.sqrt(rms / bufferLength);
      
      // If practically silent, return no pitch
      // LOWERED THRESHOLD per user request to avoid cutting off sustained notes
      if (rms < 0.005) {
        return { midi: -1, confidence: 0 };
      }
      
      // Autocorrelation pitch detection
      const sampleRate = audioContext.sampleRate;
      const minFreq = 65;   // Extended bass range (C2)
      const maxFreq = 1200; // Extended soprano range
      const minPeriod = Math.floor(sampleRate / maxFreq);
      const maxPeriod = Math.floor(sampleRate / minFreq);
      
      // Compute autocorrelation profile
      // We will look for the "first significant peak" to avoid octave errors
      // (Standard autocorrelation often picks the sub-harmonic at 2x period)
      
      let bestCorrelation = -1;
      let correlations = new Float32Array(maxPeriod + 1);
      
      for (let period = minPeriod; period <= maxPeriod; period++) {
        let correlation = 0;
        // Optimization: limit sample count for performance
        // Using a smaller window (e.g. 512 samples) is usually enough for pitch
        const searchLen = Math.min(bufferLength - period, 1024);
        
        for (let i = 0; i < searchLen; i++) {
          correlation += buffer[i] * buffer[i + period];
        }
        
        // Normalize
        correlation /= searchLen;
        correlations[period] = correlation;
        
        if (correlation > bestCorrelation) {
          bestCorrelation = correlation;
        }
      }
      
      // Calculate confidence (normalized against signal power)
      const meanPower = rms * rms;
      const confidence = bestCorrelation / meanPower;
      
      // HEURISTIC: Find the FIRST peak that is "strong enough" (e.g. > 90% of best)
      // This favors higher frequencies (shorter periods) which helps avoid 
      // jumping to the octave below (sub-harmonic error).
      
      let foundPeriod = 0;
      const threshold = bestCorrelation * 0.9;
      
      // We need to find a local maximum that exceeds threshold
      for (let period = minPeriod + 1; period < maxPeriod; period++) {
        if (correlations[period] > threshold &&
            correlations[period] > correlations[period - 1] &&
            correlations[period] > correlations[period + 1]) {
          foundPeriod = period;
          break; // Found the first strong peak, stop searching!
        }
      }
      
      // Fallback to best period if no earlier peak found (shouldn't happen if best is a peak)
      if (foundPeriod === 0) {
          // Find the index of bestCorrelation
          for (let p = minPeriod; p <= maxPeriod; p++) {
              if (correlations[p] === bestCorrelation) {
                  foundPeriod = p;
                  break;
              }
          }
      }

      // Refine period using parabolic interpolation for better precision
      // (Reduces "stepping" artifacts between integer periods)
      let refinedPeriod = foundPeriod;
      if (foundPeriod > minPeriod && foundPeriod < maxPeriod) {
          const a = correlations[foundPeriod - 1];
          const b = correlations[foundPeriod];
          const c = correlations[foundPeriod + 1];
          const offset = (a - c) / (2 * (a - 2 * b + c));
          refinedPeriod = foundPeriod + offset;
      }

      // Convert period to frequency, then to MIDI note
      // Lowered confidence threshold slightly to catch breathy notes
      if (refinedPeriod > 0 && confidence > 0.3) { 
        const frequency = sampleRate / refinedPeriod;
        const midiNote = 12 * Math.log2(frequency / 440) + 69;
        return { midi: midiNote, confidence: confidence };
      }
      
      return { midi: -1, confidence: 0 };
    }

    /**
     * Start the pitch detection loop.
     * Runs at ~30fps and stores pitch data for the active recording voice.
     */
    function startPitchDetection() {
      if (pitchDetectionRunning || !analyserNode) return;
      
      pitchDetectionRunning = true;
      recordingStartTime = Tone.Transport.seconds;
      
      // Clear previous trace data for this voice
      if (recordingVoiceIndex !== null) {
        pitchTraceData[recordingVoiceIndex] = [];
      }
      
      // Buffers for smoothing
      const medianBuffer = [];
      const medianSize = 7; // Number of frames to consider for median (removes outliers)
      let smoothedMidi = null;
      const smoothingFactor = 0.3; // 0 = no smoothing, 1 = frozen. 0.3 is responsive but smooth.
      
      function detectLoop() {
        if (!pitchDetectionRunning) return;
        
        // Get current pitch
        const { midi, confidence } = detectPitch(analyserNode);
        
        // Process pitch if we have ANY signal, even if low confidence (to maintain continuity if possible)
        // But strictly filter noise
        if (midi > 0 && confidence > 0.4) {
           medianBuffer.push(midi);
           if (medianBuffer.length > medianSize) {
             medianBuffer.shift();
           }
           
           // Only start recording points once we have a full buffer to stabilize
           if (medianBuffer.length >= 3) {
             // Calculate median
             const sorted = [...medianBuffer].sort((a, b) => a - b);
             const median = sorted[Math.floor(sorted.length / 2)];
             
             // Apply exponential smoothing
             if (smoothedMidi === null) {
               smoothedMidi = median;
             } else {
               // If the jump is huge (octave error or new phrase), reset smoothing
               if (Math.abs(smoothedMidi - median) > 5) {
                 smoothedMidi = median;
               } else {
                 smoothedMidi = smoothedMidi * (1 - smoothingFactor) + median * smoothingFactor;
               }
             }
             
             if (recordingVoiceIndex !== null) {
                const currentTime = Tone.Transport.seconds - recordingStartTime;
                pitchTraceData[recordingVoiceIndex].push({
                  tSec: currentTime,
                  midi: smoothedMidi,
                  confidence: confidence
                });
                
                // Update the live trace visualization
                updatePitchTrace(recordingVoiceIndex);
             }
           }
        } else {
          // If signal is lost, we can optionally clear the buffer or keep it for bridging gaps.
          // For now, let's slowly drain the buffer to handle short dropouts? 
          // Or just let it be. If we stop adding points, the line breaks (which is good for silence).
          // To support phrase gaps, we'll reset smoothing if silence persists.
          if (medianBuffer.length > 0) medianBuffer.shift();
          if (medianBuffer.length === 0) smoothedMidi = null;
        }
        
        // Continue the loop (aim for ~30fps)
        pitchDetectionAnimFrame = requestAnimationFrame(detectLoop);
      }
      
      detectLoop();
    }

    /**
     * Stop the pitch detection loop.
     */
    function stopPitchDetection() {
      pitchDetectionRunning = false;
      if (pitchDetectionAnimFrame) {
        cancelAnimationFrame(pitchDetectionAnimFrame);
        pitchDetectionAnimFrame = null;
      }
    }

    // ===== RECORDING (MediaRecorder) =====
    /**
     * Start recording audio from the microphone for the specified voice part.
     * @param {number} voiceIndex - Voice index (0=S, 1=A, 2=T, 3=B)
     */
    async function startRecording(voiceIndex) {
      // Make sure we have a generated progression
      if (!currentVoicedChords || currentVoicedChords.length === 0) {
        alert("Please generate a chord progression first (press G).");
        return;
      }
      
      // Set up microphone if not already done
      const micReady = await setupMicrophone();
      if (!micReady) return;
      
      // Stop any existing playback
      if (isPlaying) {
        stopPlayback();
      }
      
      // Mark that we're recording
      isRecording = true;
      recordingVoiceIndex = voiceIndex;
      recordedChunks = [];
      
      // Update UI to show recording state
      updateRecordingUI();
      
      // Do the count-in, then start actual recording
      await Tone.start();  // Make sure audio context is running
      
      doCountIn(() => {
        // After count-in, start the actual recording and playback
        startRecordingAfterCountIn(voiceIndex);
      });
    }

    /**
     * Called after the count-in completes to start actual recording.
     * @param {number} voiceIndex - Voice index being recorded
     */
    function startRecordingAfterCountIn(voiceIndex) {
      // Use the mono summed stream from the audio context
      const recordStream = monoDest ? monoDest.stream : micStream;
      
      // Start MediaRecorder to capture audio
      try {
        mediaRecorder = new MediaRecorder(recordStream, { mimeType: 'audio/webm' });
      } catch (e) {
        // Fallback if webm is not supported
        mediaRecorder = new MediaRecorder(recordStream);
      }
      
      mediaRecorder.ondataavailable = (event) => {
        if (event.data.size > 0) {
          recordedChunks.push(event.data);
        }
      };
      
      mediaRecorder.onstop = () => {
        // Create blob from recorded chunks
        const blob = new Blob(recordedChunks, { type: 'audio/webm' });
        const blobUrl = URL.createObjectURL(blob);
        
        // Revoke old blob URL if exists
        if (voiceRecordings[voiceIndex]) {
          URL.revokeObjectURL(voiceRecordings[voiceIndex]);
        }
        
        // Store the new recording
        voiceRecordings[voiceIndex] = blobUrl;
        
        // Update the recording indicator
        updateRecordingIndicators();
        
        // Create a Tone.Player for this recording
        createVocalPlayer(voiceIndex, blobUrl);
        
        console.log(`Recording saved for voice ${voiceIndex}`);
      };
      
      mediaRecorder.start();
      
      // Start pitch detection
      startPitchDetection();
      
      // Start the click track if enabled
      if (clickTrackEnabled) {
        startClickTrack();
      }
      
      // Start the synth playback if enabled
      if (playSynthEnabled && currentVoicedChords) {
        schedulePlayback(currentVoicedChords, currentTempo);
      }
      
      // Start the transport
      Tone.Transport.start();
      isPlaying = true;
      document.getElementById("playPauseBtn").textContent = "Pause (space)";
      
      // Schedule automatic stop at the end of the loop
      const loopDuration = currentVoicedChords.length * (60 / currentTempo) * 4; // 4 beats per chord
      setTimeout(() => {
        if (isRecording && recordingVoiceIndex === voiceIndex) {
          stopRecording();
        }
      }, loopDuration * 1000);
    }

    /**
     * Stop the current recording.
     */
    function stopRecording() {
      if (!isRecording) return;
      
      // Stop the pitch detection
      stopPitchDetection();
      
      // Stop the MediaRecorder
      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
      }
      
      // Stop the click track
      stopClickTrack();
      
      // Stop playback
      stopPlayback();
      
      // Clear recording state
      isRecording = false;
      recordingVoiceIndex = null;
      
      // Update UI
      updateRecordingUI();
    }

    /**
     * Update the UI to reflect current recording state.
     */
    function updateRecordingUI() {
      // Update record buttons
      document.querySelectorAll('.record-btn').forEach(btn => {
        const voice = parseInt(btn.getAttribute('data-voice'));
        if (isRecording && voice === recordingVoiceIndex) {
          btn.classList.add('recording');
        } else {
          btn.classList.remove('recording');
        }
      });
    }

    /**
     * Update the recording indicator dots next to each voice.
     */
    function updateRecordingIndicators() {
      document.querySelectorAll('.voice-recorded').forEach(dot => {
        const voice = parseInt(dot.getAttribute('data-voice'));
        if (voiceRecordings[voice]) {
          dot.classList.add('has-recording');
        } else {
          dot.classList.remove('has-recording');
        }
      });
    }

    // ===== VOCAL PLAYBACK (Tone.Player) =====
    /**
     * Create a Tone.Player for a recorded voice.
     * @param {number} voiceIndex - Voice index
     * @param {string} blobUrl - URL of the recorded audio blob
     */
    function createVocalPlayer(voiceIndex, blobUrl) {
      // Dispose of existing player if any
      if (vocalPlayers[voiceIndex]) {
        vocalPlayers[voiceIndex].dispose();
      }
      
      // Create new player and connect to its own gain node for mixing
      const player = new Tone.Player({
        url: blobUrl,
        loop: true,
        volume: 0,
        onload: () => {
          // Normalize the audio once it's loaded to maximize volume
          if (player.buffer) {
            player.buffer = player.buffer.normalize();
          }
        }
      });

      // Initialize vocal panner if it doesn't exist (to match synth panning)
      if (!vocalPanners[voiceIndex]) {
        vocalPanners[voiceIndex] = new Tone.Panner(synthPanners[voiceIndex].pan.value);
        // Connect panner to vocal reverb
        vocalPanners[voiceIndex].connect(vocalReverb);
      }

      // Initialize vocal gain if it doesn't exist
      if (!vocalGains[voiceIndex]) {
        vocalGains[voiceIndex] = new Tone.Gain(1);
        vocalGains[voiceIndex].connect(vocalPanners[voiceIndex]);
      }
      
      player.connect(vocalGains[voiceIndex]);
      vocalPlayers[voiceIndex] = player;
      
      // Update volume immediately to match current solo/mute state
      updateMutes();
    }

    /**
     * Start playing all recorded vocals in sync with the transport.
     */
    function startVocalPlayback() {
      if (!playVocalsEnabled) return;
      
      vocalPlayers.forEach((player, idx) => {
        if (player && player.loaded && voiceRecordings[idx]) {
          // Sync the player to start at the current transport position
          player.start(0);
        }
      });
    }

    /**
     * Stop all vocal playback.
     */
    function stopVocalPlayback() {
      vocalPlayers.forEach(player => {
        if (player) {
          player.stop();
        }
      });
    }

    /**
     * Clear all recordings.
     */
    function clearAllRecordings() {
      for (let i = 0; i < 4; i++) {
        if (voiceRecordings[i]) {
          URL.revokeObjectURL(voiceRecordings[i]);
          voiceRecordings[i] = null;
        }
        if (vocalPlayers[i]) {
          vocalPlayers[i].dispose();
          vocalPlayers[i] = null;
        }
        pitchTraceData[i] = [];
      }
      updateRecordingIndicators();
      clearAllPitchTraces();
      
      // Force a redraw of the grid to ensure traces are removed from the SVG
      if (currentVoicedChords) {
        drawProgression(currentVoicedChords);
      }
    }

    // ===== TRACE RENDERING (SVG PATH) =====
    /**
     * Calculate continuous diatonic step for a given MIDI note.
     * Interpolates between scale steps for smooth trace rendering.
     */
    function getContinuousDiatonicStep(midi, key, isMinor) {
      const keyBase = noteToSemitone[key.toUpperCase().replace("♯", "#").replace("♭", "b")] || 0;
      const scale = isMinor ? [0, 2, 3, 5, 7, 8, 10] : [0, 2, 4, 5, 7, 9, 11];
      
      let diff = midi - keyBase;
      let octave = Math.floor(diff / 12);
      let semitone = diff % 12;
      if (semitone < 0) { semitone += 12; octave -= 1; }
      
      // Interpolate within the scale
      let stepInOctave = 0;
      let found = false;
      
      // Handle wrapping for top of scale
      const extScale = [...scale, 12];
      
      for (let i = 0; i < scale.length; i++) {
        if (semitone >= extScale[i] && semitone < extScale[i+1]) {
          const frac = (semitone - extScale[i]) / (extScale[i+1] - extScale[i]);
          stepInOctave = i + frac;
          found = true;
          break;
        }
      }
      
      if (!found) {
        // Should catch the upper bound case (approaching 12)
         if (semitone >= scale[scale.length-1]) {
             const frac = (semitone - scale[scale.length-1]) / (12 - scale[scale.length-1]);
             stepInOctave = (scale.length - 1) + frac;
         }
      }
      
      // 1-based step index (root is 1)
      return (octave * 7) + stepInOctave + 1;
    }

    /**
     * Redraws all stored pitch traces on the SVG grid.
     * Ensures they persist across grid redraws and apply correct styling (grey when muted).
     */
    function redrawAllPitchTraces() {
      for (let i = 0; i < 4; i++) {
        updatePitchTrace(i);
      }
    }

    /**
     * Update the pitch trace visualization for a voice.
     * Draws an SVG path showing the detected pitches over time.
     * @param {number} voiceIndex - Voice index to update trace for
     */
    function updatePitchTrace(voiceIndex) {
      const svg = document.getElementById("chordSvg");
      const traceId = `pitch-trace-${voiceIndex}`;
      
      // Remove existing trace path for this voice
      const existingPath = document.getElementById(traceId);
      if (existingPath) {
        existingPath.remove();
      }
      
      const traceData = pitchTraceData[voiceIndex];
      if (!traceData || traceData.length < 2) return;
      if (!currentVoicedChords || currentVoicedChords.length === 0) return;

      // Determine styling: match voice color (desaturated for user trace), or grey if muted/hidden by solo
      const isMuted = userMuteStates[voiceIndex] || (soloStates.some(s => s) && !soloStates[voiceIndex]);
      let strokeColor = isMuted ? "#555" : getVoiceColor(voiceIndex);
      
      // Desaturate the voice color for the user pitch trace to distinguish it from the primary contour
      if (!isMuted) {
        strokeColor = desaturateColor(strokeColor, 0.4); // 40% desaturation
      }
      const opacity = isMuted ? 0.3 : 0.6; // Slightly lower opacity for a "background" feel

      // --- REPLICATE GRID MAPPING LOGIC FROM drawProgression ---
      // This ensures our trace aligns exactly with where the synth markers are drawn.
      
      // 1. Determine fixed starting rows
      let topDeg = currentVoicedChords[0].voiceDegrees[0];
      if (topDeg < 1) topDeg = 1;
      // Access the global getSopranoStartRow function
      const startRowSop = getSopranoStartRow(topDeg);
      const fixedRowsArr = [startRowSop, 12, 10];
      
      // Adjust rows based on soprano start (same logic as drawProgression)
      if (fixedRowsArr[0] === 17) { fixedRowsArr[1] = 15; fixedRowsArr[2] = 12; }
      else if (fixedRowsArr[0] === 19) { fixedRowsArr[1] = 17; fixedRowsArr[2] = 15; }
      
      const bassBaseRow = 8;

      // 2. Determine global initial steps (reference points)
      // We need these to calculate relative offsets
      const startChord = currentVoicedChords[0];
      const initialRefSteps = [];
      for(let v=0; v<3; v++) {
        initialRefSteps[v] = getAbsoluteDiatonicStep(startChord.notes[v], currentKey, keyIsMinor);
      }
      const initialBassStep = getAbsoluteDiatonicStep(startChord.notes[3], currentKey, keyIsMinor);

      // 3. Check for "ShiftTopVoicesBy7" condition
      const recognizedSoprano = currentVoicedChords.filter(ch => ch.voiceDegrees[0] >= 1);
      let shiftTopVoicesBy7 = false;
      if (recognizedSoprano.length > 0) {
        let highestChord = recognizedSoprano[0];
        let maxMidi = highestChord.notes[0];
        for (let i = 1; i < recognizedSoprano.length; i++) {
          if (recognizedSoprano[i].notes[0] > maxMidi) {
            highestChord = recognizedSoprano[i];
            maxMidi = recognizedSoprano[i].notes[0];
          }
        }
        if (highestChord.voiceDegrees[0] === 1) shiftTopVoicesBy7 = true;
      }

      // --- END GRID LOGIC ---

      // Geometry calculation
      const chordCount = currentVoicedChords.length;
      const chordWidth = 120;
      const totalWidth = chordWidth * chordCount;
      const viewBoxWidth = getViewBoxWidth(chordCount);
      const xOffset = viewBoxWidth > totalWidth ? (viewBoxWidth - totalWidth) / 2 : 0;
      const topMargin = 50;
      const gridBottom = topMargin + (numRows - 1) * rowSpacing;
      
      const beatsPerChord = 4;
      const totalBeats = chordCount * beatsPerChord;
      const loopDuration = totalBeats * (60 / currentTempo);
      
      let pathD = "";
      traceData.forEach((point, idx) => {
        // Map time to X
        const xFraction = point.tSec / loopDuration;
        const x = xOffset + xFraction * totalWidth;
        
        // Map MIDI to Y using continuous diatonic steps
        const currentContinuousStep = getContinuousDiatonicStep(point.midi, currentKey, keyIsMinor);
        
        let rowVal;
        if (voiceIndex < 3) { // S, A, T
           const offset = currentContinuousStep - initialRefSteps[voiceIndex];
           rowVal = fixedRowsArr[voiceIndex] + offset;
           if (shiftTopVoicesBy7) rowVal += 7;
        } else { // Bass
           const offset = currentContinuousStep - initialBassStep;
           rowVal = bassBaseRow + offset;
        }
        
        // Convert row to Y pixels
        // Grid convention: Row 1 is bottom, Row N is top. 
        // y = gridBottom - (row - 1) * spacing
        const y = gridBottom - (rowVal - 1) * rowSpacing + MARKER_CIRCLE_OFFSET;
        
        if (idx === 0) {
          pathD += `M ${x} ${y} `;
        } else {
          pathD += `L ${x} ${y} `;
        }
      });
      
      // Create the path element
      const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
      path.setAttribute("id", traceId);
      path.setAttribute("d", pathD);
      path.setAttribute("class", "pitch-trace-path");
      path.setAttribute("stroke", strokeColor);
      path.setAttribute("stroke-opacity", opacity);
      
      // Insert at the beginning of the SVG so it stays behind markers and contour lines
      if (svg.firstChild) {
        svg.insertBefore(path, svg.firstChild);
      } else {
        svg.appendChild(path);
      }
    }

    /**
     * Clear all pitch trace visualizations.
     */
    function clearAllPitchTraces() {
      for (let i = 0; i < 4; i++) {
        const trace = document.getElementById(`pitch-trace-${i}`);
        if (trace) trace.remove();
      }
    }

    // ===== CHOIR MODE EVENT LISTENERS =====
    // Choir Mode toggle button
    document.getElementById("choirModeToggleBtn").addEventListener("click", async () => {
      choirModeEnabled = !choirModeEnabled;
      document.getElementById("choirModeToggleBtn").textContent = "Choir Mode: " + (choirModeEnabled ? "ON" : "OFF");
      
      // Show/hide the choir mode controls section
      const choirSection = document.getElementById("choirModeSection");
      if (choirModeEnabled) {
        choirSection.classList.add("active");
        // Pre-initialize the microphone when entering Choir Mode
        await setupMicrophone();
      } else {
        choirSection.classList.remove("active");
        // Stop any ongoing recording
        if (isRecording) {
          stopRecording();
        }
      }
    });

    // Click track toggle button
    document.getElementById("clickTrackToggleBtn").addEventListener("click", () => {
      clickTrackEnabled = !clickTrackEnabled;
      const btn = document.getElementById("clickTrackToggleBtn");
      btn.textContent = "Click: " + (clickTrackEnabled ? "ON" : "OFF");
      btn.classList.toggle("active", clickTrackEnabled);
      
      // If currently playing, start/stop the click track
      if (isPlaying && !isRecording) {
        if (clickTrackEnabled) {
          startClickTrack();
        } else {
          stopClickTrack();
        }
      }
    });

    // Record buttons for each voice
    document.querySelectorAll('.record-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (!choirModeEnabled) {
          alert("Please enable Choir Mode first.");
          return;
        }
        
        const voiceIndex = parseInt(btn.getAttribute('data-voice'));
        
        // If already recording this voice, stop
        if (isRecording && recordingVoiceIndex === voiceIndex) {
          stopRecording();
        } 
        // If recording a different voice, stop and start new
        else if (isRecording) {
          stopRecording();
          setTimeout(() => startRecording(voiceIndex), 100);
        }
        // Start new recording
        else {
          await startRecording(voiceIndex);
        }
      });
    });

    // Stop recording button
    document.getElementById("stopRecordingBtn").addEventListener("click", () => {
      if (isRecording) {
        stopRecording();
      }
    });

    // Synth playback toggle
    document.getElementById("playSynthToggleBtn").addEventListener("click", () => {
      playSynthEnabled = !playSynthEnabled;
      const btn = document.getElementById("playSynthToggleBtn");
      btn.classList.toggle("active", playSynthEnabled);
      
      // Update all mutes to respect the new toggle state
      updateMutes();
    });

    // Vocals playback toggle
    document.getElementById("playVocalsToggleBtn").addEventListener("click", () => {
      playVocalsEnabled = !playVocalsEnabled;
      const btn = document.getElementById("playVocalsToggleBtn");
      btn.classList.toggle("active", playVocalsEnabled);
      
      // Update all mutes to respect the new toggle state
      updateMutes();
    });

    // Vocal Reverb Controls
    const vocalReverbPanel = document.getElementById("vocalReverbControlPanel");
    const openVocalReverbBtn = document.getElementById("openVocalReverbBtn");
    const closeVocalReverbBtn = document.getElementById("closeVocalReverbPanel");
    
    openVocalReverbBtn.addEventListener("click", () => {
      vocalReverbPanel.style.display = "block";
    });
    
    closeVocalReverbBtn.addEventListener("click", () => {
      vocalReverbPanel.style.display = "none";
    });
    
    document.getElementById("vocalReverbDecay").addEventListener("input", (e) => {
      const val = parseFloat(e.target.value);
      document.getElementById("vocalReverbDecayVal").textContent = val;
      vocalReverb.decay = val;
      vocalReverb.generate();
    });
    
    document.getElementById("vocalReverbWet").addEventListener("input", (e) => {
      const val = parseFloat(e.target.value);
      document.getElementById("vocalReverbWetVal").textContent = val;
      vocalReverb.wet.value = val;
    });

    // Clear all recordings button
    document.getElementById("clearAllRecordingsBtn").addEventListener("click", () => {
      if (confirm("Clear all voice recordings?")) {
        clearAllRecordings();
      }
    });

    // Modify the existing playPauseBtn handler to include vocal playback
    // We need to hook into the play/pause logic to start/stop vocals
    const originalPlayPauseHandler = playPauseBtn.onclick;
    
    // Override play behavior to include vocals
    // (Note: The existing event listener in the original code will still work,
    // but we add a hook to manage vocal playback when Choir Mode is active)
    const originalSchedulePlayback = schedulePlayback;
    
    // Add a Transport event to start vocals when playback begins
    Tone.Transport.on("start", () => {
      if (choirModeEnabled && playVocalsEnabled && !isRecording) {
        startVocalPlayback();
      }
      if (choirModeEnabled && clickTrackEnabled && !isRecording) {
        startClickTrack();
      }
    });
    
    Tone.Transport.on("stop", () => {
      stopVocalPlayback();
      stopClickTrack();
    });
    
    Tone.Transport.on("pause", () => {
      stopVocalPlayback();
      stopClickTrack();
    });

  </script>
</body>
